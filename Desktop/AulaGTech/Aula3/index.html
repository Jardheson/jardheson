<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Página cadastro</title>
  </head>
  <body>
    <div class="container">
      <div class="esquerda">
        <h2>Get Started</h2>
        <label for="name">Nome</label>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="Digite seu nome"
          required
        />
        <label for="">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Digite seu email"
          required
        />
        <label for="senha">Senha</label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Digite sua senha"
          required
        />
        <div class="opcoes">
          <button>Cadastre-se</button>

          <a href="../Aula2/index.html">Entrar</a>
        </div>

        <!-- Exemplo de termo -->
        <div id="check">
          <input type="checkbox" name="termos" id="termos" required />
          <p>
            Eu concordo e aceito os
            <a
              href="https://www.facebook.com/privacy/policy/?entry_point=data_policy_redirect&entry=0"
              target="_blank"
              >termos</a
            >
          </p>
        </div>

        <!-- Exemplo de termo -->
        <!-- <div id="check">
                <input type="checkbox" name="termos" id="termos" required>
                <label for="termos"> Li e aceito os termos de uso termos</label>
                <a href="https://www.facebook.com/privacy/policy/?entry_point=data_policy_redirect&entry=0" target="_blank">Termos</a>
            </div> -->
      </div>
      <div class="direita">
        <img src="./img/animate.svg" alt="imagem animada" width="400px" />
      </div>
    </div>

</html>
